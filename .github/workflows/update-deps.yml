name: Update dependencies

# Runs every Sunday at 02:00 UTC.
# Updates all workspace dependencies to latest compatible versions and opens a PR.
on:
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  update-deps:
    name: cargo update + audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo update (update Cargo.lock to latest compatible versions)
        run: cargo update

      - name: cargo audit (fail the PR if new vulnerabilities were introduced)
        run: cargo audit
        continue-on-error: true   # still open the PR so the team can review

      - name: Check if Cargo.lock changed
        id: diff
        run: |
          git diff --quiet Cargo.lock \
            && echo "changed=false" >> "$GITHUB_OUTPUT" \
            || echo "changed=true"  >> "$GITHUB_OUTPUT"

      - name: Commit updated Cargo.lock
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "deps/update-cargo-lock-$(date +%Y%m%d)"
          git add Cargo.lock
          git commit -m "chore(deps): update Cargo.lock to latest compatible versions [automated]"
          git push --set-upstream origin "deps/update-cargo-lock-$(date +%Y%m%d)"

      - name: Open pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: "deps/update-cargo-lock-${{ github.run_id }}"
          title: "chore(deps): update Cargo.lock [${{ github.run_id }}]"
          body: |
            Automated weekly dependency update generated by the **Update dependencies** workflow.

            - Run `cargo update` to bump all workspace crates to the latest semver-compatible versions.
            - `cargo audit` was also run — check the job log for any new advisories before merging.

            **Review the diff before merging** to catch any unexpected major-version bumps or behavioural changes.
          labels: automated, dependencies
          delete-branch: true
