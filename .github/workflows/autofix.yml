name: Auto-fix (clippy + fmt)

# Runs every Monday at 03:00 UTC.
# Applies `cargo clippy --fix` and `cargo fmt` then opens a PR if anything changed.
on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  autofix:
    name: Apply clippy fixes and format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need a token with write access to push the branch + open a PR.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust stable + clippy + rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "autofix"

      - name: cargo clippy --fix (all lints, allow dirty/staged)
        run: |
          cargo clippy --workspace --all-targets --fix \
            --allow-dirty \
            --allow-staged \
            -- -W clippy::all -W clippy::pedantic -W clippy::nursery \
               -A clippy::missing_errors_doc \
               -A clippy::missing_panics_doc \
               -A clippy::module_name_repetitions
        continue-on-error: true

      - name: cargo fmt --all
        run: cargo fmt --all

      - name: Check if anything changed
        id: diff
        run: |
          git diff --quiet && echo "changed=false" >> "$GITHUB_OUTPUT" \
                           || echo "changed=true"  >> "$GITHUB_OUTPUT"

      - name: Commit changes
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "autofix/clippy-fmt-$(date +%Y%m%d)"
          git add -A
          git commit -m "chore: apply clippy fixes and cargo fmt [automated]"
          git push --set-upstream origin "autofix/clippy-fmt-$(date +%Y%m%d)"

      - name: Open pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: "autofix/clippy-fmt-${{ github.run_id }}"
          title: "chore: automated clippy + fmt fixes"
          body: |
            Automated weekly PR generated by the **Auto-fix** workflow.

            Changes applied:
            - `cargo clippy --fix` (all, pedantic, nursery)
            - `cargo fmt --all`

            Review before merging — clippy's pedantic fixes occasionally need human judgment.
          labels: automated, chore
          delete-branch: true
