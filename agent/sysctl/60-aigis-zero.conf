# Aigis-Zero Agent — kernel tunables for osquery eBPF
# Applied by install.sh. Verified by install.sh after application.

# Inotify limits (osquery uses inotify internally)
fs.inotify.max_user_watches = 524288
fs.inotify.max_user_instances = 256
fs.inotify.max_queued_events = 32768

# BPF JIT compilation (required for eBPF performance)
net.core.bpf_jit_enable = 1

# Restrict unprivileged BPF loading (security hardening — root-only)
kernel.unprivileged_bpf_disabled = 1

# Reduce OOM risk for RocksDB under sustained event load
vm.overcommit_memory = 1
