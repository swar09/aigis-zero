syntax = "proto3";
package edr.events;

import "agent.proto";

// Normalised event envelope used across the pipeline
message NormalisedEvent {
  string id = 1;
  string node_id = 2;
  string event_type = 3;    // "process" | "file" | "network" | "osquery"
  int64 timestamp_ns = 4;
  string hostname = 5;
  bytes payload = 6;         // JSON-encoded event data
  string raw_sequence_id = 7;
}

// Alert generated by the rule engine
message Alert {
  string id = 1;
  string node_id = 2;
  string hostname = 3;
  int64 timestamp_ns = 4;
  string severity = 5;               // "critical" | "high" | "medium" | "low"
  string source = 6;                 // "yara" | "ml_model" | "rule_engine"
  string mitre_technique_id = 7;
  string mitre_tactic = 8;
  string description = 9;
  string triggering_event_id = 10;
  float threat_score = 11;
  string status = 12;                // "open" | "acknowledged" | "dismissed"
}
