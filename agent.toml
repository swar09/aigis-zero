[fleet]
endpoint = "http://localhost:50051"
heartbeat_interval_secs = 30
batch_size = 100

[agent]
buffer_path = "/tmp/edr_event_buffer.db"
log_level = "debug"
log_format = "human"
# TESTING ONLY: path to seed scheduled queries into SQLite on startup.
# Remove this field (and scheduled_queries.toml) when fleet server push is ready.
scheduled_queries_path = "scheduled_queries.toml"

[osquery]
socket_path = "/var/osquery/osquery.em"
connect_timeout_secs = 10
schedule = []

[osquery.options]
# -- Events & Audit (matches updated Dockerfile) --
disable_events        = false
disable_audit         = false
audit_allow_process_events = true
audit_allow_sockets   = true
audit_allow_config    = true
audit_persist         = true

# -- Performance --
events_max            = 50000
schedule_splay_percent = 10
watchdog_level        = 0

# -- Identity --
host_identifier       = "hostname"
